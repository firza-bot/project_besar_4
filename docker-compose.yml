version: '3.8'

services:
  web:
    build: .
    volumes:
      - static_volume_v3:/app/staticfiles
      - media_volume_v3:/app/mediafiles
    environment:
      - DEBUG=0
      - SECRET_KEY=ganti_dengan_key_produksi_anda
    networks:
      - django_net

  nginx:
    image: nginx:alpine
    container_name: creation_nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume_v3:/app/staticfiles
      - media_volume_v3:/app/mediafiles
    depends_on:
      - web
    networks:
      - django_net
      - global_gateway_net

volumes:
  static_volume_v3:
  media_volume_v3:

networks:
  django_net:
    driver: bridge
  global_gateway_net:
    external: true
